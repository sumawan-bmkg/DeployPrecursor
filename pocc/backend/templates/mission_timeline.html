<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mission Timeline — BOCC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/static/css/bocc.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-dark bocc-topbar fixed-top px-3"><div class="container-fluid">
<div class="d-flex align-items-center gap-3"><img src="/static/img/logo_bmkg.svg" height="28"><span class="navbar-brand mb-0 fw-bold">BOCC</span><span class="badge bg-light text-dark">Timeline</span></div><span id="liveTime" class="text-light small"></span></div></nav>
<div class="bocc-sidebar"><div class="sidebar-menu">
<a href="/" class="sidebar-item"><i class="fas fa-rocket"></i><span>Overview</span></a>
<a href="/engineering" class="sidebar-item"><i class="fas fa-microchip"></i><span>Engineering</span></a>
<a href="/scientific-ops" class="sidebar-item"><i class="fas fa-flask"></i><span>Scientific Ops</span></a>
<a href="/pipeline-runtime" class="sidebar-item"><i class="fas fa-project-diagram"></i><span>Pipeline</span></a>
<a href="/mission-timeline" class="sidebar-item active"><i class="fas fa-clock"></i><span>Timeline</span></a>
<a href="/alert-center" class="sidebar-item"><i class="fas fa-bell"></i><span>Alerts</span></a>
<a href="/evidence-center" class="sidebar-item"><i class="fas fa-folder-open"></i><span>Evidence</span></a>
<a href="/release-center" class="sidebar-item"><i class="fas fa-tags"></i><span>Release</span></a>
<a href="/executive-center" class="sidebar-item"><i class="fas fa-chart-pie"></i><span>Executive</span></a>
<hr class="sidebar-divider">
<a href="/governance" class="sidebar-item"><i class="fas fa-shield-alt"></i><span>Governance</span></a>
<a href="/digitaltwin" class="sidebar-item"><i class="fas fa-cube"></i><span>Digital Twin</span></a>
</div></div>
<div class="bocc-main">
<h5 class="fw-bold mb-2"><i class="fas fa-clock me-2 text-info"></i>Mission Timeline</h5>
<div class="mb-2"><div class="btn-group btn-group-sm" role="group">
<button class="btn btn-outline-light active" onclick="filterTimeline('all',this)">All</button>
<button class="btn btn-outline-light" onclick="filterTimeline('collector',this)">Collector</button>
<button class="btn btn-outline-light" onclick="filterTimeline('runtime',this)">Runtime</button>
<button class="btn btn-outline-light" onclick="filterTimeline('burnin',this)">Burn-in</button>
<button class="btn btn-outline-light" onclick="filterTimeline('psep',this)">PSEP</button>
<button class="btn btn-outline-light" onclick="filterTimeline('governance',this)">Governance</button>
<button class="btn btn-outline-light" onclick="filterTimeline('release',this)">Release</button>
</div></div>
<div id="timelineList" class="small">Loading...</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
setInterval(function(){document.getElementById('liveTime').textContent=new Date().toLocaleString('id-ID',{timeZone:'Asia/Makassar',hour12:false})},1000);
var _filter='all';
function filterTimeline(f,btn){
    _filter=f;
    document.querySelectorAll('.btn-group .btn').forEach(function(b){b.classList.remove('active')});
    if(btn)btn.classList.add('active');
    refreshTimeline();
}
function refreshTimeline(){
    var url='/api/timeline/events';
    if(_filter!='all')url+='?component='+_filter;
    fetch(url).then(r=>r.json()).then(function(d){
        var events=d.events||[];
        var html='';
        if(events.length===0){document.getElementById('timelineList').innerHTML='<div class="text-muted py-3">No events recorded yet</div>';return;}
        events.reverse().forEach(function(e){
            html+='<div class="d-flex align-items-center mb-2 pb-1" style="border-bottom:1px solid rgba(255,255,255,.04)">';
            html+='<small class="text-muted me-3" style="min-width:60px">'+e.wita+'</small>';
            html+='<span class="badge bg-secondary me-2" style="font-size:.6rem">'+e.component+'</span>';
            html+='<small>'+e.event+'</small>';
            if(e.detail)html+='<small class="text-muted ms-2">— '+e.detail+'</small>';
            html+='</div>';
        });
        document.getElementById('timelineList').innerHTML=html||'<div class="text-muted">No events for this filter</div>';
    }).catch(function(){})
}
refreshTimeline();setInterval(refreshTimeline,15000);
</script></body></html>
