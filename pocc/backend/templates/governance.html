{% extends "base.html" %}
{% block title %}BOCC — Governance{% endblock %}
{% block content %}
<style>
.gov-state-machine { background:var(--card-bg,#1e293b); border-radius:12px; padding:20px; border:1px solid var(--border,#334155); margin-bottom:16px; }
.gov-state { display:inline-block; padding:6px 16px; border-radius:20px; font-weight:600; font-size:.85rem; margin:4px; }
.gov-state.active { background:#0f2b5e; color:#93bbfd; border:1px solid #3b82f6; }
.gov-state.pending { background:#422006; color:#fbbf24; border:1px solid #f59e0b; }
.gov-state.done { background:#064e3b; color:#6ee7b7; border:1px solid #10b981; }
.gov-action { padding:12px 16px; border-bottom:1px solid var(--border,#334155); display:flex; justify-content:space-between; align-items:center; }
.gov-action:last-child { border-bottom:none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<div class="page-header"><h1>Governance Engine</h1><p>State machine — verified actions & roles</p></div>

<div class="gov-state-machine">
<h6>States</h6>
<div id="stateList" class="mt-2"></div>
</div>

<div class="row">
<div class="col-md-8">
<div class="card"><div class="card-header"><div class="card-title">Actions</div><span id="actionCount" class="badge bg-info">0</span></div>
<div id="actionList"></div></div>
</div>
<div class="col-md-4">
<div class="card"><div class="card-header"><div class="card-title">Roles</div></div>
<div id="roleList" class="p-3"></div>
</div>
</div>

<script>
async function loadGovernance() {
  let state={}, actions=[], roles=["Chief Scientist","Principal Engineer","SRE","Operator","ERB Member","Release Manager"];
  try { const r=await fetch('/api/governance/state').then(r=>r.json()); state=r; } catch(e) {}
  try { const r=await fetch('/api/governance/actions').then(r=>r.json()); actions=r.actions||r||[]; } catch(e) {}

  const states = state.states || ['COMMAND','QUALIFY','RELEASE','ACCREDIT','OPERATE'];
  document.getElementById('stateList').innerHTML = states.map(s => 
    `<span class="gov-state ${s===state.current?'active':'done'}">${s}</span>`
  ).join('') + `<span class="gov-state ${state.current?'':'active'}">${state.current||'INIT'}</span>`;

  const a = Array.isArray(actions) ? actions : [];
  document.getElementById('actionCount').textContent = a.length;
  document.getElementById('actionList').innerHTML = a.slice(-20).reverse().map(c => `
    <div class="gov-action"><span>${c.command||c.action||'?'}</span><span class="badge ${c.status==='DONE'?'bg-success':c.status==='PENDING'?'bg-warning text-dark':'bg-secondary'}">${c.status||'?'}</span></div>
  `).join('') || '<div class="p-3 text-muted">No actions recorded</div>';

  document.getElementById('roleList').innerHTML = roles.map(r => 
    `<div class="d-flex align-items-center gap-2 mb-2"><i class="fas fa-user-shield text-primary"></i><span>${r}</span></div>`
  ).join('');
}
loadGovernance();
setInterval(loadGovernance,15000);
</script>
{% endblock %}
