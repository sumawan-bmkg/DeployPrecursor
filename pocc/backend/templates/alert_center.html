<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alert Center — BOCC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/static/css/bocc.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-dark bocc-topbar fixed-top px-3"><div class="container-fluid">
<div class="d-flex align-items-center gap-3"><img src="/static/img/logo_bmkg.svg" height="28"><span class="navbar-brand mb-0 fw-bold">BOCC</span><span class="badge bg-light text-dark">Alerts</span></div><span id="liveTime" class="text-light small"></span></div></nav>
<div class="bocc-sidebar"><div class="sidebar-menu">
<a href="/" class="sidebar-item"><i class="fas fa-rocket"></i><span>Overview</span></a>
<a href="/engineering" class="sidebar-item"><i class="fas fa-microchip"></i><span>Engineering</span></a>
<a href="/scientific-ops" class="sidebar-item"><i class="fas fa-flask"></i><span>Scientific Ops</span></a>
<a href="/pipeline-runtime" class="sidebar-item"><i class="fas fa-project-diagram"></i><span>Pipeline</span></a>
<a href="/mission-timeline" class="sidebar-item"><i class="fas fa-clock"></i><span>Timeline</span></a>
<a href="/alert-center" class="sidebar-item active"><i class="fas fa-bell"></i><span>Alerts</span></a>
<a href="/evidence-center" class="sidebar-item"><i class="fas fa-folder-open"></i><span>Evidence</span></a>
<a href="/release-center" class="sidebar-item"><i class="fas fa-tags"></i><span>Release</span></a>
<a href="/executive-center" class="sidebar-item"><i class="fas fa-chart-pie"></i><span>Executive</span></a>
<hr class="sidebar-divider">
<a href="/governance" class="sidebar-item"><i class="fas fa-shield-alt"></i><span>Governance</span></a>
<a href="/digitaltwin" class="sidebar-item"><i class="fas fa-cube"></i><span>Digital Twin</span></a>
</div></div>
<div class="bocc-main">
<h5 class="fw-bold mb-2"><i class="fas fa-bell me-2 text-warning"></i>Alert Center</h5>
<div class="mb-2"><div class="btn-group btn-group-sm" role="group">
<button class="btn btn-outline-light active" onclick="filterAlerts('all',this)">All</button>
<button class="btn btn-outline-danger" onclick="filterAlerts('CRITICAL',this)">Critical</button>
<button class="btn btn-outline-warning" onclick="filterAlerts('HIGH',this)">High</button>
<button class="btn btn-outline-info" onclick="filterAlerts('WARNING',this)">Warning</button>
<button class="btn btn-outline-secondary" onclick="filterAlerts('INFO',this)">Info</button>
</div></div>
<div id="alertCounts" class="mb-2 d-flex gap-2 small"></div>
<div id="alertList" class="small">Loading...</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
setInterval(function(){document.getElementById('liveTime').textContent=new Date().toLocaleString('id-ID',{timeZone:'Asia/Makassar',hour12:false})},1000);
var _sev=null;
function filterAlerts(s,btn){
    _sev=(s==='all')?null:s;
    document.querySelectorAll('.btn-group .btn').forEach(function(b){b.classList.remove('active')});
    if(btn)btn.classList.add('active');
    refreshAlerts();
}
function refreshAlerts(){
    var url='/api/oi/alerts?limit=200';
    if(_sev)url+='&severity='+_sev;
    fetch(url).then(r=>r.json()).then(function(d){
        var alerts=d.alerts||[];var counts=d.counts||{};
        document.getElementById('alertCounts').innerHTML=
            '<span class="badge bg-danger">CRITICAL: '+(counts.CRITICAL||0)+'</span>'+
            '<span class="badge bg-warning text-dark">HIGH: '+(counts.HIGH||0)+'</span>'+
            '<span class="badge bg-info">WARNING: '+(counts.WARNING||0)+'</span>'+
            '<span class="badge bg-secondary">INFO: '+(counts.INFO||0)+'</span>';
        var html='';
        alerts.forEach(function(a){
            var c=a.severity==='CRITICAL'?'danger':'warning';
            if(a.severity==='WARNING')c='info';
            if(a.severity==='INFO')c='secondary';
            html+='<div class="d-flex align-items-start mb-2 pb-1" style="border-bottom:1px solid rgba(255,255,255,.04)">';
            html+='<span class="badge bg-'+c+' me-2" style="min-width:60px;font-size:.6rem">'+a.severity+'</span>';
            html+='<div class="flex-grow-1"><small><strong>'+a.title+'</strong></small><br><small class="text-muted">'+a.description+'</small></div>';
            html+='<small class="text-muted" style="min-width:80px">'+(a.timestamp||'').slice(11,19)+'</small>';
            html+='<div class="ms-2">';
            if(a.status!=='RESOLVED')html+='<button class="btn btn-sm btn-outline-success py-0 px-2" onclick="ackAlert(\''+a.uuid+'\')"><i class="fas fa-check"></i></button>';
            html+='</div></div>';
        });
        document.getElementById('alertList').innerHTML=html||'<div class="text-muted py-3">No alerts</div>';
    }).catch(function(){})
}
function ackAlert(uuid){fetch('/api/oi/alerts/'+uuid+'/acknowledge',{method:'POST'}).then(function(){refreshAlerts();});}
refreshAlerts();setInterval(refreshAlerts,15000);
</script></body></html>
