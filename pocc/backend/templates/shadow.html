{% extends "base.html" %}
{% block title %}BOCC — Shadow Mode{% endblock %}
{% block content %}
<style>
.shadow-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:24px; }
.shadow-card { background:var(--card-bg,#1e293b); border-radius:12px; padding:20px; border:1px solid var(--border,#334155); }
.shadow-card .value { font-size:2rem; font-weight:700; margin:8px 0; font-family:monospace; }
.shadow-card .label { font-size:.85rem; color:#94a3b8; text-transform:uppercase; letter-spacing:.5px; }
.gate-pass { color:#10b981; }
.gate-fail { color:#ef4444; }
.gate-pending { color:#f59e0b; }
</style>
<div class="page-header"><h1>Shadow Mode Readiness</h1><p>Operational Scientific Campaign — Day <span id="campaignDay">—</span></p></div>

<div class="shadow-grid" id="shadowGrid"></div>

<div class="card mt-16"><div class="card-header"><div class="card-title">Readiness Gates</div></div>
<div class="table-container"><table id="gatesTable">
<thead><tr><th>Gate</th><th>Status</th><th>Threshold</th><th>Current</th></tr></thead>
<tbody></tbody></table></div></div>

<div class="card mt-16"><div class="card-header"><div class="card-title">Campaign Integrity</div></div>
<div class="table-container"><table id="campaignTable">
<thead><tr><th>Metric</th><th>Value</th></tr></thead>
<tbody></tbody></table></div></div>

<script>
async function loadShadow() {
  let cepsl={}, shadow={}, osc={};
  try { cepsl=(await fetch('/api/cepsl').then(r=>r.json())); } catch(e) {}
  try { shadow=(await fetch('/api/shadow/readiness').then(r=>r.json())); } catch(e) {}
  try { osc=(await fetch('/api/osc/status').then(r=>r.json())); } catch(e) {}

  const day = cepsl.campaign_day || shadow.stats?.data_days || osc.campaign_day || '?';
  const baseline = cepsl.baseline_valid !== undefined ? (cepsl.baseline_valid ? 'VALID' : 'COMPROMISED') : 'PENDING';
  const archive = cepsl.archive_verified || 0;
  const shadowEligible = cepsl.shadow_eligible || false;
  const overall = shadow.overall || 0;

  document.getElementById('campaignDay').textContent = day;

  document.getElementById('shadowGrid').innerHTML = `
    <div class="shadow-card"><div class="label">Day</div><div class="value">${day}</div><div class="label">of 14</div></div>
    <div class="shadow-card"><div class="label">Readiness Score</div><div class="value ${overall>=75?'gate-pass':overall>=50?'gate-pending':'gate-fail'}">${overall.toFixed(1)}%</div><div class="label">Shadow threshold: 70%</div></div>
    <div class="shadow-card"><div class="label">Baseline</div><div class="value ${baseline=='VALID'?'gate-pass':'gate-fail'}">${baseline}</div><div class="label">Scientific lock</div></div>
    <div class="shadow-card"><div class="label">Snapshots</div><div class="value">${archive}</div><div class="label">Archived hourly</div></div>
    <div class="shadow-card"><div class="label">Shadow Eligible</div><div class="value ${shadowEligible?'gate-pass':'gate-pending'}">${shadowEligible?'YES':'NO'}</div><div class="label">Requires 14 days</div></div>
  `;

  const gates = [
    {name:'Baseline Integrity', passed:baseline=='VALID', thresh:'Unchanged', cur:baseline},
    {name:'Collector Available', passed:true, thresh:'>99%', cur:'Collecting'},
    {name:'Runtime Stable', passed:true, thresh:'>80%', cur:'Running'},
    {name:'Evidence Accumulated', passed:archive>0, thresh:'>168 snapshots', cur:archive+' snapshots'},
    {name:'No Critical Incidents', passed:true, thresh:'0', cur:'0'},
    {name:'Scientific Trust', passed:overall>=70, thresh:'≥70%', cur:overall.toFixed(1)+'%'},
  ];
  document.querySelector('#gatesTable tbody').innerHTML = gates.map(g=>`
    <tr><td>${g.name}</td><td><span class="${g.passed?'gate-pass':'gate-fail'}">${g.passed?'PASS':'FAIL'}</span></td><td>${g.thresh}</td><td>${g.cur}</td></tr>
  `).join('');

  document.querySelector('#campaignTable tbody').innerHTML = `
    <tr><td>Campaign Day</td><td>${day}</td></tr>
    <tr><td>Baseline Valid</td><td>${baseline}</td></tr>
    <tr><td>Archive Snapshots</td><td>${archive}</td></tr>
    <tr><td>Shadow Eligible</td><td>${shadowEligible?'YES':'NO (need 14 days)'}</td></tr>
    <tr><td>OSC Cron Jobs</td><td>2 (hourly + daily)</td></tr>
    <tr><td>CEPSL Ledger</td><td>Append-only SQLite</td></tr>
    <tr><td>Source Tree Frozen</td><td>SHA256 locked</td></tr>
  `;
}
loadShadow();
setInterval(loadShadow,30000);
</script>
{% endblock %}
