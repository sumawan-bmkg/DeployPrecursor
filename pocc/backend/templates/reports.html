{% extends "base.html" %}
{% block title %}BOCC — Scientific Reports{% endblock %}
{% block content %}
<style>
.rpt-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-bottom:24px; }
.rpt-card { background:var(--card-bg,#1e293b); border-radius:12px; padding:20px; border:1px solid var(--border,#334155); cursor:pointer; transition:.2s; }
.rpt-card:hover { border-color:#3b82f6; transform:translateY(-2px); }
.rpt-card .icon { font-size:2rem; margin-bottom:8px; }
.rpt-card .title { font-weight:600; margin-bottom:4px; }
.rpt-card .desc { font-size:.82rem; color:#94a3b8; }
.rpt-card .date { font-size:.72rem; color:#64748b; margin-top:8px; }
.rpt-content { background:var(--card-bg,#1e293b); border-radius:12px; padding:24px; border:1px solid var(--border,#334155); white-space:pre-wrap; font-family:monospace; font-size:.82rem; line-height:1.6; max-height:600px; overflow-y:auto; }
</style>
<div class="page-header"><h1>Scientific Reports</h1><p>Daily & campaign reports generated by OSC</p></div>

<div class="rpt-grid" id="reportGrid"></div>

<div class="card mt-16" id="reportViewer" style="display:none">
<div class="card-header"><div class="card-title" id="reportTitle">Report</div>
<button class="btn btn-sm btn-outline-secondary" onclick="closeReport()">Close</button></div>
<div class="rpt-content" id="reportContent"></div></div>

<script>
async function loadReports() {
  let reports = [];
  try { reports = (await fetch('/api/reports').then(r=>r.json())).reports || []; } catch(e) {}

  document.getElementById('reportGrid').innerHTML = reports.length ? reports.map(r => `
    <div class="rpt-card" onclick="viewReport('${r.path}','${r.name}')">
      <div class="icon">📄</div>
      <div class="title">${r.name}</div>
      <div class="desc">${r.type||'Report'}</div>
      <div class="date">${r.date||'—'}</div>
    </div>
  `).join('') : '<div class="text-muted p-3">No reports yet. OSC runs hourly, first daily report at 00:05.</div>';
}

async function viewReport(path, name) {
  document.getElementById('reportTitle').textContent = name;
  document.getElementById('reportViewer').style.display = 'block';
  document.getElementById('reportContent').textContent = 'Loading...';
  try {
    const r = await fetch('/api/report?path='+encodeURIComponent(path)).then(r=>r.json());
    document.getElementById('reportContent').textContent = r.content || 'Empty';
  } catch(e) {
    document.getElementById('reportContent').textContent = 'Error loading report';
  }
}
function closeReport() { document.getElementById('reportViewer').style.display = 'none'; }

loadReports();
</script>
{% endblock %}
