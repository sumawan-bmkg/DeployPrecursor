<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/static/css/bocc.css" rel="stylesheet"></head><body>

<div class="d-flex align-items-center gap-3"><img src="/static/img/logo_bmkg.svg" height="28"><span class="navbar-brand mb-0 fw-bold">BOCC</span><span class="badge bg-light text-dark">Engineering</span></div><span id="liveTime" class="text-light small"></span></div></nav>
<div class="bocc-sidebar"><div class="sidebar-menu">
<a href="/" class="sidebar-item"><i class="fas fa-rocket"></i><span>Overview</span></a>
<a href="/engineering" class="sidebar-item active"><i class="fas fa-microchip"></i><span>Engineering</span></a>

</div></div>
<div class="bocc-main">
<h5 class="fw-bold mb-3"><i class="fas fa-microchip me-2 text-info"></i>Engineering Dashboard</h5>
<div class="row g-2 mb-3" id="cpuRow"></div>
<div class="row g-2 mb-3" id="memoryRow"></div>
<div class="row g-2 mb-3" id="diskRow"></div>
<div class="row g-2 mb-3" id="gpuRow"></div>
<div class="row g-2 mb-3" id="processRow"></div>
<div class="row g-2" id="networkRow"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
setInterval(function(){document.getElementById('liveTime').textContent=new Date().toLocaleString('id-ID',{timeZone:'Asia/Makassar',hour12:false})},1000);
function refreshEng(){
    fetch('/api/infrastructure').then(r=>r.json()).then(d=>{
        function card(label,value,unit,color){return '<div class="col-md-3 col-6"><div class="kpi-card '+color+'"><div class="label">'+label+'</div><div class="value fs-4">'+value+'</div><div class="sub">'+unit+'</div></div></div>';}
        var cpu=d.cpu||{}; var mem=d.memory||{}; var proc=d.process||{};
        document.getElementById('cpuRow').innerHTML=
            card('CPU Usage',cpu.usage_pct||'?','%','blue')+
            card('CPU Load 1m',cpu.load_1m||'?','/ '+cpu.cores,'blue')+
            card('CPU Load 5m',cpu.load_5m||'?','','yellow')+
            card('CPU Temp',cpu.temperature_c||'N/A','°C',cpu.temperature_c>70?'red':'green');
        document.getElementById('memoryRow').innerHTML=
            card('RAM Used',mem.used_mb||'?','MB of '+mem.total_mb+'MB','blue')+
            card('RAM %',mem.usage_pct||'?','%',mem.usage_pct>90?'red':mem.usage_pct>70?'yellow':'green')+
            card('Available',mem.available_mb||'?','MB','green')+
            card('Swap %',mem.swap_pct||'?','%',mem.swap_pct>50?'yellow':'blue');
        var diskHtml=''; (d.disk||[]).forEach(function(ds){diskHtml+=card(ds.mount,ds.usage_pct+'%',ds.total_gb+'GB / '+ds.device,ds.usage_pct>90?'red':ds.usage_pct>70?'yellow':'green');});
        document.getElementById('diskRow').innerHTML=diskHtml||card('Disk','N/A','No data','gray');
        var gpu=d.gpu||{};
        document.getElementById('gpuRow').innerHTML=
            card('GPU',gpu.name||'N/A','','blue')+
            (gpu.available!==false?card('GPU Util',gpu.utilization_pct+'%','',gpu.utilization_pct>90?'red':'green')+'<div class="col-md-3 col-6"><div class="kpi-card blue"><div class="label">GPU Mem</div><div class="value fs-5">'+gpu.memory_used_mb+'</div><div class="sub">MB / '+gpu.memory_total_mb+'MB</div></div></div>'+card('GPU Temp',gpu.temperature_c||'?','°C',gpu.temperature_c>80?'red':'green'):''); 
        document.getElementById('processRow').innerHTML=
            card('Processes',proc.total_processes||'?','total','blue')+
            card('Threads',proc.threads||'?','','blue')+
            card('Open FDs',proc.open_fds||'?','','yellow')+
            card('Uptime',d.load?.uptime?.split('up')[1]?.split(',')[0]||'?','days','green');
        var net=d.network||{};
        document.getElementById('networkRow').innerHTML=
            card('RX Total',net.rx_gb||'?','GB','blue')+
            card('TX Total',net.tx_gb||'?','GB','green');
    }).catch(function(){})
}
refreshEng();setInterval(refreshEng,10000);
</script></body></html>
