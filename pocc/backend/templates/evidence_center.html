<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/static/css/bocc.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-dark bocc-topbar fixed-top px-3"><div class="container-fluid">
<div class="d-flex align-items-center gap-3"><img src="/static/img/logo_bmkg.svg" height="28"><span class="navbar-brand mb-0 fw-bold">BOCC</span><span class="badge bg-light text-dark">Evidence</span></div><span id="liveTime" class="text-light small"></span></div></nav>
<div class="bocc-sidebar"><div class="sidebar-menu">
<a href="/" class="sidebar-item"><i class="fas fa-rocket"></i><span>Overview</span></a>
<a href="/engineering" class="sidebar-item"><i class="fas fa-microchip"></i><span>Engineering</span></a>
<a href="/scientific-ops" class="sidebar-item"><i class="fas fa-flask"></i><span>Scientific Ops</span></a>
<a href="/pipeline-runtime" class="sidebar-item"><i class="fas fa-project-diagram"></i><span>Pipeline</span></a>
<a href="/mission-timeline" class="sidebar-item"><i class="fas fa-clock"></i><span>Timeline</span></a>
<a href="/alert-center" class="sidebar-item"><i class="fas fa-bell"></i><span>Alerts</span></a>
<a href="/evidence-center" class="sidebar-item active"><i class="fas fa-folder-open"></i><span>Evidence</span></a>
<a href="/release-center" class="sidebar-item"><i class="fas fa-tags"></i><span>Release</span></a>
<a href="/executive-center" class="sidebar-item"><i class="fas fa-chart-pie"></i><span>Executive</span></a>
<hr class="sidebar-divider">
<a href="/governance" class="sidebar-item"><i class="fas fa-shield-alt"></i><span>Governance</span></a>
<a href="/digitaltwin" class="sidebar-item"><i class="fas fa-cube"></i><span>Digital Twin</span></a>
</div></div>
<div class="bocc-main">
<h5 class="fw-bold mb-2"><i class="fas fa-folder-open me-2 text-info"></i>Evidence Center</h5>
<div class="mb-2"><input type="text" id="searchBox" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Search evidence..." onkeyup="searchEv(this.value)"></div>
<div id="evidenceList" class="small">Loading...</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
setInterval(function(){document.getElementById('liveTime').textContent=new Date().toLocaleString('id-ID',{timeZone:'Asia/Makassar',hour12:false})},1000);
var _search=null;
function searchEv(v){_search=v||null;refreshEv();}
function refreshEv(){
    var url='/api/evidence/list';
    if(_search)url+='?search='+encodeURIComponent(_search);
    fetch(url).then(r=>r.json()).then(function(d){
        var pkgs=d.packages||[];
        var html='';
        pkgs.forEach(function(p){
            var t=''?p.type==='governance'?'primary':p.type==='psep'?'success':p.type==='burnin'?'warning':'secondary':'secondary';
            html+='<div class="d-flex align-items-center mb-2 pb-1" style="border-bottom:1px solid rgba(255,255,255,.04)">';
            html+='<span class="badge bg-'+t+' me-2">'+p.type+'</span>';
            html+='<div class="flex-grow-1"><small><strong>'+p.uuid+'</strong></small><br><small class="text-muted">'+(p.files||[]).join(', ').slice(0,60)+'</small></div>';
            html+='<small class="text-muted">'+(p.size_kb||0).toFixed(1)+'KB</small>';
            html+='<button class="btn btn-sm btn-outline-info ms-2 py-0 px-2" onclick="showEv(\''+p.uuid+'\')"><i class="fas fa-eye"></i></button>';
            html+='</div>';
        });
        document.getElementById('evidenceList').innerHTML=html||'<div class="text-muted py-3">No evidence packages found</div>';
    }).catch(function(){})
}
function showEv(uuid){
    fetch('/api/evidence/package/'+uuid).then(r=>r.json()).then(function(d){
        var html='<h6 class="fw-bold">Evidence: '+uuid+'</h6>';
        var fs=d.files||{};
        Object.keys(fs).forEach(function(k){
            var v=typeof fs[k]==='object'?JSON.stringify(fs[k],null,2).slice(0,200):String(fs[k]).slice(0,200);
            html+='<div class="hash-line mt-2"><strong>'+k+':</strong><br><code>'+v+'</code></div>';
        });
        document.getElementById('evidenceList').innerHTML=html+'<button class="btn btn-sm btn-outline-light mt-2" onclick="refreshEv()">Back</button>';
    }).catch(function(){})
}
refreshEv();setInterval(refreshEv,30000);
</script></body></html>
