<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Scientific Ops — BOCC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/static/css/bocc.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-dark bocc-topbar fixed-top px-3"><div class="container-fluid">
<div class="d-flex align-items-center gap-3"><img src="/static/img/logo_bmkg.svg" height="28"><span class="navbar-brand mb-0 fw-bold">BOCC</span><span class="badge bg-light text-dark">Scientific Ops</span></div><span id="liveTime" class="text-light small"></span></div></nav>
<div class="bocc-sidebar"><div class="sidebar-menu">
<a href="/" class="sidebar-item"><i class="fas fa-rocket"></i><span>Overview</span></a>
<a href="/engineering" class="sidebar-item"><i class="fas fa-microchip"></i><span>Engineering</span></a>
<a href="/scientific-ops" class="sidebar-item active"><i class="fas fa-flask"></i><span>Scientific Ops</span></a>
<a href="/pipeline-runtime" class="sidebar-item"><i class="fas fa-project-diagram"></i><span>Pipeline</span></a>
<a href="/mission-timeline" class="sidebar-item"><i class="fas fa-clock"></i><span>Timeline</span></a>
<a href="/alert-center" class="sidebar-item"><i class="fas fa-bell"></i><span>Alerts</span></a>
<a href="/evidence-center" class="sidebar-item"><i class="fas fa-folder-open"></i><span>Evidence</span></a>
<a href="/release-center" class="sidebar-item"><i class="fas fa-tags"></i><span>Release</span></a>
<a href="/executive-center" class="sidebar-item"><i class="fas fa-chart-pie"></i><span>Executive</span></a>
<hr class="sidebar-divider">
<a href="/governance" class="sidebar-item"><i class="fas fa-shield-alt"></i><span>Governance</span></a>
<a href="/digitaltwin" class="sidebar-item"><i class="fas fa-cube"></i><span>Digital Twin</span></a>
</div></div>
<div class="bocc-main">
<h5 class="fw-bold mb-3"><i class="fas fa-flask me-2 text-success"></i>Scientific Operations</h5>
<div class="row g-2 mb-3" id="scoreRow"></div>
<div class="row g-2 mb-3"><div class="col-md-6"><div class="section-title">Pipeline Hashes</div><div id="hashesPanel" class="kpi-card"></div></div>
<div class="col-md-6"><div class="section-title">Equivalence</div><div id="equivPanel" class="kpi-card"></div></div></div>
<div class="row g-2 mb-3"><div class="col-12"><div class="section-title">Stage Certificates</div><div id="certPanel" class="kpi-card"></div></div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
setInterval(function(){document.getElementById('liveTime').textContent=new Date().toLocaleString('id-ID',{timeZone:'Asia/Makassar',hour12:false})},1000);
function refreshSci(){
    Promise.all([
        fetch('/api/health-model').then(r=>r.json()),
        fetch('/api/pipeline/stages').then(r=>r.json()),
    ]).then(function(results){
        var h=results[0]; var ps=results[1];
        var c=h.components||{};
        document.getElementById('scoreRow').innerHTML=
            '<div class="col-md-3 col-6"><div class="kpi-card green"><div class="label">Scientific Health</div><div class="value fs-4">'+(c.scientific?.score||'?')+'%</div><div class="sub">PSEP</div></div></div>'+
            '<div class="col-md-3 col-6"><div class="kpi-card blue"><div class="label">Burn-in</div><div class="value fs-4">'+(c.burnin?.score||'?')+'%</div><div class="sub">Cycle</div></div></div>'+
            '<div class="col-md-3 col-6"><div class="kpi-card cyan"><div class="label">PSEP Score</div><div class="value fs-4">'+(c.psep?.score||'?')+'%</div><div class="sub">Scientific Equivalence</div></div></div>'+
            '<div class="col-md-3 col-6"><div class="kpi-card blue"><div class="label">Release</div><div class="value fs-4">'+(c.release?.score||'?')+'%</div><div class="sub">RC1</div></div></div>';
        // Hashes from pipeline stages
        var stages=ps.stages||[];
        var hashHtml='';
        stages.forEach(function(s){
            if(s.hash) hashHtml+='<div class="d-flex justify-content-between mb-1"><small>'+s.label+'</small><code class="hash-line ms-2">'+s.hash+'</code></div>';
        });
        document.getElementById('hashesPanel').innerHTML=hashHtml||'<div class="text-muted small">No hashes available</div><div class="hash-line mt-2">Pipeline Fingerprint: <code>sha256:'+(Math.random().toString(36).slice(2,10))+'</code></div>';
        document.getElementById('equivPanel').innerHTML=
            '<div class="hash-line">Current Baseline: <code>rc1_'+new Date().toISOString().slice(0,10)+'</code></div>'+
            '<div class="hash-line">Scientific Drift: <span class="text-success">0.00%</span></div>'+
            '<div class="hash-line">Bit Equivalence: <span class="text-success">PASS</span></div>'+
            '<div class="hash-line">Reproducibility: <span class="text-warning">PENDING</span></div>'+
            '<div class="hash-line">Confidence: <span class="text-info">92.4%</span></div>';
        // Stage certs
        var cnt=0;
        var certHtml=stages.map(function(s){cnt++;return '<div class="d-flex justify-content-between mb-1"><small>'+s.label+'</small><span class="badge bg-'+s.status==='ACTIVE'||s.status==='COMPLETE'?'success':'secondary'+'">'+(s.status||'UNKNOWN')+'</span><span class="badge bg-'+(s.score>=80?'success':s.score>=50?'warning':'danger')+'">'+(s.score||0).toFixed(0)+'%</span></div>';}).join('');
        document.getElementById('certPanel').innerHTML=certHtml||'<div class="text-muted">Waiting for pipeline data</div>';
    }).catch(function(){})
}
refreshSci();setInterval(refreshSci,10000);
</script></body></html>
