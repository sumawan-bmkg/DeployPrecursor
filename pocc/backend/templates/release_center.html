<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/static/css/bocc.css" rel="stylesheet"></head><body>
<nav class="navbar navbar-dark bocc-topbar fixed-top px-3"><div class="container-fluid">
<div class="d-flex align-items-center gap-3"><img src="/static/img/logo_bmkg.svg" height="28"><span class="navbar-brand mb-0 fw-bold">BOCC</span><span class="badge bg-light text-dark">Release</span></div><span id="liveTime" class="text-light small"></span></div></nav>
<div class="bocc-sidebar"><div class="sidebar-menu">
<a href="/" class="sidebar-item"><i class="fas fa-rocket"></i><span>Overview</span></a>
<a href="/engineering" class="sidebar-item"><i class="fas fa-microchip"></i><span>Engineering</span></a>
<a href="/scientific-ops" class="sidebar-item"><i class="fas fa-flask"></i><span>Scientific Ops</span></a>
<a href="/pipeline-runtime" class="sidebar-item"><i class="fas fa-project-diagram"></i><span>Pipeline</span></a>
<a href="/mission-timeline" class="sidebar-item"><i class="fas fa-clock"></i><span>Timeline</span></a>
<a href="/alert-center" class="sidebar-item"><i class="fas fa-bell"></i><span>Alerts</span></a>
<a href="/evidence-center" class="sidebar-item"><i class="fas fa-folder-open"></i><span>Evidence</span></a>
<a href="/release-center" class="sidebar-item active"><i class="fas fa-tags"></i><span>Release</span></a>

</div></div>
<div class="bocc-main">
<h5 class="fw-bold mb-2"><i class="fas fa-tags me-2 text-success"></i>Release Center</h5>
<div class="row g-2 mb-3" id="phaseCards"></div>
<div class="section-title mt-2">Evidence Review Board</div>
<div class="kpi-card small" id="erbPanel">ERB not yet convened</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
setInterval(function(){document.getElementById('liveTime').textContent=new Date().toLocaleString('id-ID',{timeZone:'Asia/Makassar',hour12:false})},1000);
function refreshRelease(){
    fetch('/api/release/status').then(r=>r.json()).then(function(d){
        var html='';
        Object.keys(d).forEach(function(k){
            var p=d[k]; if(!p)return;
            var col=p.readiness>=80?'green':p.readiness>=50?'yellow':'red';
            html+='<div class="col-md-4"><div class="kpi-card small"><div class="label">'+p.name+'</div><div class="value fs-4" style="color:var(--bocc-'+col+')">'+p.readiness+'%</div><div class="sub">'+p.passed+'/'+p.total+' gates passed</div>';
            html+='<div class="mt-2 small">'+(p.gates||[]).map(function(g){return '<div class="d-flex justify-content-between"><small>'+g.gate+'</small><span class="badge bg-'+(g.status==='PASSED'?'success':g.status==='PENDING'?'secondary':g.status==='FAILED'?'danger':'warning')+'" style="font-size:.6rem">'+g.status+'</span></div>';}).join('')+'</div></div></div>';
        });
        document.getElementById('phaseCards').innerHTML=html||'<div class="text-muted">No release data</div>';
    }).catch(function(){})
}
refreshRelease();setInterval(refreshRelease,15000);
</script></body></html>
